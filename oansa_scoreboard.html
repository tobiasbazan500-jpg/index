
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; }
  .screen { display: none; }
  .screen.active { display: block; }

  #home { padding: 2rem 1rem; text-align: center; }
  .home-title { font-size: 28px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 0.5rem; }
  .home-sub { font-size: 14px; color: var(--color-text-secondary); margin-bottom: 2rem; }
  .link-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; max-width: 560px; margin: 0 auto; }
  .link-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1.5rem 1rem; cursor: pointer; transition: border-color 0.15s, background 0.15s; }
  .link-card:hover { border-color: var(--color-border-secondary); background: var(--color-background-secondary); }
  .link-card .icon { font-size: 32px; margin-bottom: 12px; }
  .link-card .lc-title { font-size: 16px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 6px; }
  .link-card .lc-desc { font-size: 13px; color: var(--color-text-secondary); line-height: 1.5; }
  .badge-admin { display: inline-block; background: #0f3460; color: #a8c4e8; font-size: 11px; padding: 3px 10px; border-radius: 20px; margin-top: 10px; }
  .badge-tv { display: inline-block; background: #3b0f20; color: #f4a4b8; font-size: 11px; padding: 3px 10px; border-radius: 20px; margin-top: 10px; }

  #scoreboard { width: 100%; }
  .score-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; background: #1a1a2e; color: white; }
  .score-header-title { font-size: 16px; font-weight: 500; }
  .mode-badge { font-size: 12px; padding: 3px 10px; border-radius: 20px; }
  .mode-admin { background: #0f3460; color: #a8c4e8; }
  .mode-tv { background: #3b0f20; color: #f4a4b8; }
  .back-btn { font-size: 12px; background: rgba(255,255,255,0.1); color: white; border: none; border-radius: 6px; padding: 4px 10px; cursor: pointer; }

  .grid { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; background: #1a1a2e; }
  .team-cell { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px 10px; min-height: 180px; position: relative; }
  .t-rojo { background: #e53935; }
  .t-azul { background: #1e88e5; }
  .t-amarillo { background: #f9a825; }
  .t-verde { background: #43a047; }

  .team-icon { font-size: 22px; margin-bottom: 4px; }
  .team-name { font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.9); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 4px; }
  .team-score { font-size: 72px; font-weight: 900; color: white; line-height: 1; text-shadow: 2px 2px 8px rgba(0,0,0,0.3); }

  .controls { display: flex; gap: 8px; margin-top: 12px; }
  .btn-pts { font-size: 14px; font-weight: 700; padding: 7px 18px; border: none; border-radius: 8px; cursor: pointer; background: rgba(0,0,0,0.25); color: white; transition: transform 0.1s, background 0.1s; }
  .btn-pts:hover { background: rgba(0,0,0,0.4); }
  .btn-pts:active { transform: scale(0.94); }

  .footer-admin { display: flex; align-items: center; justify-content: center; padding: 12px; background: #1a1a2e; gap: 12px; }
  .btn-reset { font-size: 13px; padding: 8px 20px; background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.7); border: 0.5px solid rgba(255,255,255,0.15); border-radius: 8px; cursor: pointer; }
  .btn-reset:hover { background: rgba(255,60,60,0.3); color: white; }
  .sync-indicator { font-size: 12px; color: rgba(255,255,255,0.4); display: flex; align-items: center; gap: 5px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: #4caf50; display: inline-block; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .hidden { display: none !important; }
</style>

<div id="home" class="screen active">
  <h2 class="home-title">Marcador OANSA</h2>
  <p class="home-sub">Elegí cómo querés entrar</p>
  <div class="link-cards">
    <div class="link-card" onclick="enter('admin')">
      <div class="icon"><i class="ti ti-device-mobile" aria-hidden="true"></i></div>
      <div class="lc-title">Administrador</div>
      <div class="lc-desc">Controlá los puntos desde tu teléfono</div>
      <span class="badge-admin">Control total</span>
    </div>
    <div class="link-card" onclick="enter('tv')">
      <div class="icon"><i class="ti ti-device-tv" aria-hidden="true"></i></div>
      <div class="lc-title">Pantalla TV</div>
      <div class="lc-desc">Vista para proyectar en el televisor</div>
      <span class="badge-tv">Solo lectura</span>
    </div>
  </div>
</div>

<div id="scoreboard" class="screen">
  <div class="score-header">
    <button class="back-btn" onclick="goHome()"><i class="ti ti-arrow-left" aria-hidden="true"></i> Inicio</button>
    <span class="score-header-title">Marcador OANSA</span>
    <span id="mode-badge" class="mode-badge"></span>
  </div>

  <div class="grid">
    <div class="team-cell t-rojo">
      <div class="team-icon">🔥</div>
      <div class="team-name">Rojo</div>
      <div class="team-score" id="s-rojo">0</div>
      <div class="controls admin-ctrl">
        <button class="btn-pts" onclick="change('rojo',-10)">−10</button>
        <button class="btn-pts" onclick="change('rojo',10)">+10</button>
      </div>
    </div>
    <div class="team-cell t-azul">
      <div class="team-icon">💧</div>
      <div class="team-name">Azul</div>
      <div class="team-score" id="s-azul">0</div>
      <div class="controls admin-ctrl">
        <button class="btn-pts" onclick="change('azul',-10)">−10</button>
        <button class="btn-pts" onclick="change('azul',10)">+10</button>
      </div>
    </div>
    <div class="team-cell t-amarillo">
      <div class="team-icon">🦁</div>
      <div class="team-name">Amarillo</div>
      <div class="team-score" id="s-amarillo">0</div>
      <div class="controls admin-ctrl">
        <button class="btn-pts" onclick="change('amarillo',-10)">−10</button>
        <button class="btn-pts" onclick="change('amarillo',10)">+10</button>
      </div>
    </div>
    <div class="team-cell t-verde">
      <div class="team-icon">🌳</div>
      <div class="team-name">Verde</div>
      <div class="team-score" id="s-verde">0</div>
      <div class="controls admin-ctrl">
        <button class="btn-pts" onclick="change('verde',-10)">−10</button>
        <button class="btn-pts" onclick="change('verde',10)">+10</button>
      </div>
    </div>
  </div>

  <div id="footer-admin" class="footer-admin hidden">
    <button class="btn-reset" onclick="resetAll()"><i class="ti ti-refresh" aria-hidden="true"></i> Reiniciar puntos</button>
    <span class="sync-indicator"><span class="dot"></span> En vivo</span>
  </div>
</div>

<script>
const STORAGE_KEY = 'oansa_scores_v1';
let mode = '';
let scores = { rojo: 0, azul: 0, amarillo: 0, verde: 0 };
let pollInterval = null;

function loadScores() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) scores = JSON.parse(raw);
  } catch(e) {}
}

function saveScores() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(scores));
  } catch(e) {}
}

function render() {
  document.getElementById('s-rojo').textContent = scores.rojo;
  document.getElementById('s-azul').textContent = scores.azul;
  document.getElementById('s-amarillo').textContent = scores.amarillo;
  document.getElementById('s-verde').textContent = scores.verde;
}

function enter(m) {
  mode = m;
  loadScores();
  render();

  document.getElementById('home').classList.remove('active');
  document.getElementById('scoreboard').classList.add('active');

  const badge = document.getElementById('mode-badge');
  if (m === 'admin') {
    badge.textContent = 'Administrador';
    badge.className = 'mode-badge mode-admin';
    document.querySelectorAll('.admin-ctrl').forEach(el => el.classList.remove('hidden'));
    document.getElementById('footer-admin').classList.remove('hidden');
  } else {
    badge.textContent = 'Pantalla TV';
    badge.className = 'mode-badge mode-tv';
    document.querySelectorAll('.admin-ctrl').forEach(el => el.classList.add('hidden'));
  }

  pollInterval = setInterval(() => {
    loadScores();
    render();
  }, 1000);
}

function goHome() {
  clearInterval(pollInterval);
  document.getElementById('scoreboard').classList.remove('active');
  document.getElementById('home').classList.add('active');
}

function change(team, delta) {
  if (mode !== 'admin') return;
  scores[team] = Math.max(0, scores[team] + delta);
  saveScores();
  render();
}

function resetAll() {
  if (!confirm('¿Reiniciar todos los puntos a 0?')) return;
  scores = { rojo: 0, azul: 0, amarillo: 0, verde: 0 };
  saveScores();
  render();
}

loadScores();
</script>
